prefix: "!"
log_channel: null
mod_log_channel: null
mute_role: null

automod:
  enabled: false
  anti_spam:
    enabled: false
    messages: 5
    seconds: 5
    action: mute
    duration: 300
  anti_invite:
    enabled: false
    action: delete
  bad_words:
    enabled: false
    words: []
    action: delete
  caps_limit:
    enabled: false
    percent: 70
    min_length: 10
