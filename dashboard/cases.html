<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cases — Nightpigeon</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="night-bg"></div>
<div class="stars"></div>

<div class="app-container">
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <img src="/static/pigeon.jpeg" alt="Nightpigeon" />
      <span>Nightpigeon</span>
    </a>
    <div class="navbar-links">
      <a href="/">Home</a>
      <a href="/guilds">Guilds</a>
      <a href="/docs-page">Docs</a>
    </div>
    <div class="navbar-right">
      <div class="user-badge"></div>
      <a href="#" id="back-link" class="btn btn-secondary">← Config</a>
    </div>
  </nav>

  <main>
    <div class="flash-container"></div>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;">
      <h1 class="page-title" style="margin:0">Cases</h1>
      <div style="font-size:0.85rem; color:var(--text-muted)">
        <span id="guild-name-label">Loading...</span>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="cases-toolbar">
      <select class="input" id="filter-action" style="min-width:140px;">
        <option value="">All Actions</option>
        <option value="ban">Ban</option>
        <option value="forceban">Force Ban</option>
        <option value="unban">Unban</option>
        <option value="kick">Kick</option>
        <option value="mute">Mute</option>
        <option value="unmute">Unmute</option>
        <option value="warn">Warn</option>
        <option value="note">Note</option>
      </select>
      <input
        class="input" type="text" id="filter-user"
        placeholder="User ID" style="width:160px"
        oninput="debounceLoad()"
      />
      <button class="btn btn-secondary" onclick="loadCases()">
        Search
      </button>
      <div style="margin-left:auto; color:var(--text-muted); font-size:0.85rem">
        Total: <strong id="total-count">—</strong>
      </div>
    </div>

    <!-- Table -->
    <div class="cases-table-wrap">
      <table id="cases-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Action</th>
            <th>User</th>
            <th>Moderator</th>
            <th>Reason</th>
            <th>Duration</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="cases-tbody">
          <tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text-muted)">
            <div class="loading-spinner" style="margin:0 auto 12px"></div>
            Loading cases...
          </td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </main>

  <footer>
    <p>Nightpigeon</p>
  </footer>
</div>

<script src="/config.js"></script>
<script src="/static/app.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const guildId = params.get('guild');
let currentPage = 1;
let totalPages = 1;
let debounceTimer;

document.getElementById('back-link').href = `/config?guild=${guildId}`;

if (!guildId) window.location.href = '/guilds';

async function loadCases() {
  const action = document.getElementById('filter-action').value;
  const userId = document.getElementById('filter-user').value.trim();
  const tbody = document.getElementById('cases-tbody');

  tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">
    <div class="loading-spinner" style="margin:0 auto 12px"></div>
    Loading...
  </td></tr>`;

  let url = `/api/guilds/${guildId}/cases?page=${currentPage}&per_page=25`;
  if (action) url += `&action=${action}`;
  if (userId) url += `&user_id=${userId}`;

  try {
    const data = await apiFetch(url);
    totalPages = data.pages || 1;
    document.getElementById('total-count').textContent = data.total?.toLocaleString() || '0';

    if (!data.cases || data.cases.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:60px;color:var(--text-muted)">No cases found.</td></tr>`;
      renderPagination();
      return;
    }

    tbody.innerHTML = data.cases.map(c => `
      <tr onclick="showCaseDetail(${c.case_number})" style="cursor:pointer">
        <td>#${c.case_number}</td>
        <td>${actionBadge(c.action)}</td>
        <td>
          <div style="font-weight:500;color:var(--text-primary)">${escapeHtml(c.user_tag || 'Unknown')}</div>
          <div style="font-size:0.75rem;color:var(--text-muted)">${c.user_id}</div>
        </td>
        <td style="color:var(--text-secondary)">${escapeHtml(c.moderator_tag || 'Unknown')}</td>
        <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary)"
            title="${escapeHtml(c.reason || '')}">${escapeHtml(c.reason || 'No reason')}</td>
        <td style="color:var(--text-muted)">${c.duration || '—'}</td>
        <td style="color:var(--text-muted);white-space:nowrap">${relTime(c.created_at)}</td>
      </tr>
    `).join('');

    renderPagination();
  } catch (err) {
    if (err.message !== 'Unauthorized') {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px">
        <div class="alert alert-error">${err.message}</div>
      </td></tr>`;
    }
  }
}

function renderPagination() {
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  let html = `<button ${currentPage <= 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">◀</button>`;

  const start = Math.max(1, currentPage - 2);
  const end = Math.min(totalPages, currentPage + 2);
  if (start > 1) html += `<button onclick="changePage(1)">1</button>${start > 2 ? '<span style="color:var(--text-muted)">…</span>' : ''}`;

  for (let i = start; i <= end; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
  }

  if (end < totalPages) {
    html += `${end < totalPages - 1 ? '<span style="color:var(--text-muted)">…</span>' : ''}<button onclick="changePage(${totalPages})">${totalPages}</button>`;
  }

  html += `<button ${currentPage >= totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">▶</button>`;
  pag.innerHTML = html;
}

function changePage(page) {
  currentPage = page;
  loadCases();
  window.scrollTo(0, 0);
}

function debounceLoad() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(loadCases, 400);
}

document.getElementById('filter-action').addEventListener('change', () => {
  currentPage = 1;
  loadCases();
});

async function showCaseDetail(caseNumber) {
  try {
    const c = await apiFetch(`/api/guilds/${guildId}/cases/${caseNumber}`);
    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);
      z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px
    `;
    overlay.innerHTML = `
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;max-width:500px;width:100%;position:relative">
        <button onclick="this.closest('div[style*=fixed]').remove()"
          style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.2rem">✕</button>
        <div style="margin-bottom:8px">${actionBadge(c.action)}</div>
        <h2 style="font-size:1.5rem;margin-bottom:20px">Case #${c.case_number}</h2>
        <div style="display:grid;gap:12px">
          <div><span style="color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:.05em">User</span><div>${escapeHtml(c.user_tag || 'Unknown')} <span style="color:var(--text-muted);font-size:0.8rem">(${c.user_id})</span></div></div>
          <div><span style="color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:.05em">Moderator</span><div>${escapeHtml(c.moderator_tag || 'Unknown')}</div></div>
          <div><span style="color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:.05em">Reason</span><div>${escapeHtml(c.reason || 'No reason')}</div></div>
          ${c.duration ? `<div><span style="color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:.05em">Duration</span><div>${c.duration}</div></div>` : ''}
          <div><span style="color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:.05em">Date</span><div>${c.created_at ? new Date(c.created_at).toLocaleString() : '—'}</div></div>
          <div><span style="color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:.05em">Status</span><div>${c.active ? '<span style="color:var(--success)">Active</span>' : '<span style="color:var(--text-muted)">Deleted</span>'}</div></div>
        </div>
      </div>
    `;
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
  } catch (err) {
    showAlert('Failed to load case: ' + err.message, 'error');
  }
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadGuildName() {
  try {
    const guilds = await apiFetch('/api/guilds');
    const guild = guilds?.find(g => g.id === guildId);
    if (guild) {
      document.getElementById('guild-name-label').textContent = guild.name;
      document.title = `Cases — ${guild.name} — Nightpigeon`;
    }
  } catch {}
}

document.addEventListener('DOMContentLoaded', () => {
  loadCases();
  loadGuildName();
});
</script>
</body>
</html>
