services:
  - type: web
    name: nightpigeon-bot-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main_bot_api.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: API_SECRET_KEY
        sync: false
      - key: REDIRECT_URI
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DASHBOARD_URL
        sync: false

  - type: web
    name: nightpigeon-dashboard
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install fastapi uvicorn
    startCommand: python dashboard_server.py
    envVars:
      - key: API_URL
        sync: false
      - key: DASHBOARD_URL
        sync: false
